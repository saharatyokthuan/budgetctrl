<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>รายการประจำ · BUDGET//CTRL+</title>
<link rel="stylesheet" href="css/style.css">
<!-- PWA Meta -->
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BudgetCtrl">
<link rel="apple-touch-icon" href="icons/icon-192x192.png">

<!-- Service Worker -->
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js')
    .then(reg => console.log('✅ SW registered:', reg))
    .catch(err => console.log('❌ SW error:', err));
}
</script>
</head>
<body>
<div class="app">
  <nav class="sidebar" id="sidebar-mount"></nav>
  <main class="main">

    <div class="card">
      <h2>รายการทำซ้ำอัตโนมัติ</h2>
      <div id="list"><div class="empty">ยังไม่มีรายการประจำ</div></div>
    </div>

    <button class="btn" id="addBtn">+ เพิ่มรายการประจำ</button>

  </main>
</div>
<nav class="navbar" id="navbar-mount"></nav>

<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal">
    <span class="modal-close" id="modalClose">&times;</span>
    <h3>เพิ่มรายการประจำ</h3>
    <div class="tabs" id="formTypeTabs">
      <button data-v="expense" class="active">รายจ่าย</button>
      <button data-v="income">รายรับ</button>
    </div>
    <div class="field"><label>จำนวนเงิน</label><input type="number" step="0.01" id="fAmount"></div>
    <div class="field"><label>หมวดหมู่</label><select id="fCategory"></select></div>
    <div class="field"><label>ความถี่</label>
      <select id="fFreq">
        <option value="daily">ทุกวัน</option>
        <option value="weekly">ทุกสัปดาห์</option>
        <option value="monthly" selected>ทุกเดือน</option>
      </select>
    </div>
    <div class="field"><label>เริ่มวันที่</label><input type="date" id="fStart"></div>
    <div class="field"><label>โน้ต</label><input type="text" id="fNote"></div>
    <button class="btn" id="saveBtn">บันทึก</button>
  </div>
</div>

<script src="js/utils.js"></script>
<script src="js/db.js"></script>
<script>DB.init();</script>
<script src="js/nav.js"></script>
<script src="js/recurring.js"></script>
</body>
</html>
