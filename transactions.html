<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>รายการ · BUDGET//CTRL+</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app">
  <nav class="sidebar" id="sidebar-mount"></nav>
  <main class="main">

    <div class="card">
      <h2>ค้นหา / กรอง</h2>
      <div class="field"><input type="text" id="q" placeholder="ค้นหาหมวดหมู่หรือโน้ต..."></div>
      <div class="tabs" id="typeTabs">
        <button data-v="all" class="active">ทั้งหมด</button>
        <button data-v="income">รายรับ</button>
        <button data-v="expense">รายจ่าย</button>
      </div>
      <div class="row">
        <div class="field"><label>จากวันที่</label><input type="date" id="fromDate"></div>
        <div class="field"><label>ถึงวันที่</label><input type="date" id="toDate"></div>
      </div>
    </div>

    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <h2 style="margin:0">รายการ (เทปบัญชี)</h2>
        <button class="btn secondary sm" id="exportBtn">ส่งออก .xlsx</button>
      </div>
      <div id="list"><div class="empty">ยังไม่มีรายการ</div></div>
    </div>

  </main>
</div>
<nav class="navbar" id="navbar-mount"></nav>
<button class="fab" id="addBtn" aria-label="เพิ่มรายการ">+</button>

<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal">
    <span class="modal-close" id="modalClose">&times;</span>
    <h3>เพิ่มรายการ</h3>
    <div class="tabs" id="formTypeTabs">
      <button data-v="expense" class="active">รายจ่าย</button>
      <button data-v="income">รายรับ</button>
    </div>
    <div class="field"><label>จำนวนเงิน</label><input type="number" step="0.01" id="fAmount" placeholder="0.00"></div>
    <div class="field"><label>หมวดหมู่</label><select id="fCategory"></select></div>
    <div class="field"><label>วันที่</label><input type="date" id="fDate"></div>
    <div class="field"><label>โน้ต (ถ้ามี)</label><input type="text" id="fNote"></div>
    <button class="btn" id="saveBtn">บันทึก</button>
  </div>
</div>

<script src="js/utils.js"></script>
<script src="js/db.js"></script>
<script>DB.init();</script>
<script src="js/nav.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="js/transactions.js"></script>
</body>
</html>
