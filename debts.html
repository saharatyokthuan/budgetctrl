<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>หนี้ / ยืม-คืน · BUDGET//CTRL+</title>
<link rel="stylesheet" href="css/style.css">
<!-- PWA Meta -->
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BudgetCtrl">
<link rel="apple-touch-icon" href="icons/icon-192x192.png">

<!-- Service Worker -->
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js')
    .then(reg => console.log('✅ SW registered:', reg))
    .catch(err => console.log('❌ SW error:', err));
}
</script>
</head>
<body>
<div class="app">
  <nav class="sidebar" id="sidebar-mount"></nav>
  <main class="main">

    <div class="tabs" id="kindTabs">
      <button data-v="all" class="active">ทั้งหมด</button>
      <button data-v="owe">หนี้ที่ต้องจ่าย</button>
      <button data-v="lend">ให้คนอื่นยืม</button>
    </div>

    <div class="card">
      <h2>รายการ</h2>
      <div id="list"><div class="empty">ยังไม่มีรายการ</div></div>
    </div>

  </main>
</div>
<nav class="navbar" id="navbar-mount"></nav>
<button class="fab" id="addBtn" aria-label="เพิ่มรายการหนี้">+</button>

<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal">
    <span class="modal-close" id="modalClose">&times;</span>
    <h3>เพิ่มรายการหนี้ / ยืม-คืน</h3>
    <div class="tabs" id="formKindTabs">
      <button data-v="owe" class="active">ฉันเป็นหนี้ (ต้องจ่าย)</button>
      <button data-v="lend">ให้คนอื่นยืม (ต้องได้คืน)</button>
    </div>
    <div class="field"><label>ชื่อคน/ร้าน</label><input type="text" id="fPerson" placeholder="เช่น พี่แดง, ร้านค้า"></div>
    <div class="field"><label>จำนวนเงิน</label><input type="number" step="0.01" id="fAmount" placeholder="0.00"></div>
    <div class="field"><label>วันครบกำหนด (ถ้ามี)</label><input type="date" id="fDue"></div>
    <div class="field"><label>โน้ต</label><input type="text" id="fNote"></div>
    <button class="btn" id="saveBtn">บันทึก</button>
  </div>
</div>

<div class="modal-backdrop" id="repayBackdrop">
  <div class="modal">
    <span class="modal-close" id="repayClose">&times;</span>
    <h3 id="repayTitle">บันทึกการจ่าย/รับคืน</h3>
    <div class="field"><label>จำนวนเงิน</label><input type="number" step="0.01" id="repayAmount"></div>
    <button class="btn" id="repaySave">บันทึก</button>
  </div>
</div>

<script src="js/utils.js"></script>
<script src="js/db.js"></script>
<script>DB.init();</script>
<script src="js/nav.js"></script>
<script src="js/debts.js"></script>
</body>
</html>
